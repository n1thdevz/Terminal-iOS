<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerbes-Modern">
    <title>KERBES OSINT PLATFORM</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border: #374151;
        }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .dash-header {
            background-color: #070a12;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dash-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .dash-title span {
            color: var(--accent-blue);
        }

        .window-dots {
            display: flex;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .d-red { background-color: #ef4444; }
        .d-yellow { background-color: #f59e0b; }
        .d-green { background-color: #10b981; }

        .dash-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input[type="text"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        optgroup {
            background-color: var(--bg-card);
            color: var(--accent-blue);
            font-style: normal;
            font-weight: bold;
        }

        option {
            color: var(--text-main);
            background-color: var(--bg-input);
        }

        input[type="file"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-muted);
        }

        #image-input-container { display: none; }

        .btn-execute {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-execute:hover {
            opacity: 0.9;
        }

        .console-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #console-log {
            background-color: #070a12;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .c-green { color: var(--accent-green); }
        .c-red { color: var(--accent-red); }
        .c-blue { color: var(--accent-blue); }
        .c-muted { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="dash-header">
        <div class="dash-title">⚔️ KERBES <span>OSINT PLATFORM</span></div>
        <div class="window-dots">
            <div class="dot d-red"></div>
            <div class="dot d-yellow"></div>
            <div class="dot d-green"></div>
        </div>
    </div>
    
    <div class="dash-body">
        <!-- Rangement par style / Catégorie -->
        <div class="field-group">
            <label for="tool-select">Sélection du sous-système d'analyse</label>
            <select id="tool-select" onchange="switchTool()">
                <optgroup label="── Humint & Registres Civils">
                    <option value="sirene">sirene_registry_lookup (Nom -> INSEE)</option>
                    <option value="infogreffe">greffe_corporate_scan (Nom -> Sociétés)</option>
                    <option value="interpol">interpol_red_notice_check (Nom -> Mandats)</option>
                </optgroup>
                <optgroup label="── Cyber & Data Leaks">
                    <option value="breach">breach_database_scanner (Pseudo/Mail -> Fuites)</option>
                    <option value="username">user_alias_enumerator (Pseudo -> Matrices)</option>
                </optgroup>
                <optgroup label="── Telecom Signal Intelligence">
                    <option value="hlr">hlr_carrier_ping (Mobile -> Opérateur)</option>
                    <option value="arcep">arcep_zne_codec (Téléphone -> Zone Géo)</option>
                </optgroup>
                <optgroup label="── Img & Media Forensics">
                    <option value="nominatim">exif_gps_resolver (Image -> Adresse Exacte)</option>
                    <option value="meta_strip">stripped_metadata_fallback (Image Discord/WA)</option>
                    <option value="pdf_recon">pdf_metadata_recon (Fichier PDF -> Logs)</option>
                </optgroup>
            </select>
        </div>

        <!-- Inputs Variables Dynamiques -->
        <div class="field-group" id="text-input-container">
            <label id="variable-label" for="target-data">Donnée / Chaîne cible</label>
            <input type="text" id="target-data" placeholder="Ex: Jean Dupont" autocomplete="off">
        </div>

        <div class="field-group" id="image-input-container">
            <label for="image-file">Fichier cible à téléverser</label>
            <input type="file" id="image-file" accept="image/jpeg, image/png, image/jpg, .pdf">
        </div>

        <button class="btn-execute" onclick="executeCommand()">Lancer la compilation</button>

        <!-- Console -->
        <div class="console-wrapper">
            <label>Console d'affichage des logs</label>
            <div id="console-log">=== MONITOR SYSTEM ACTIVE v5.0 ===
[i] Sélectionnez une commande rangée par catégorie pour exécuter les scripts.</div>
        </div>
    </div>
</div>

<script>
function switchTool() {
    const tool = document.getElementById('tool-select').value;
    const textCont = document.getElementById('text-input-container');
    const imgCont = document.getElementById('image-input-container');
    const input = document.getElementById('target-data');
    const label = document.getElementById('variable-label');

    if (['nominatim', 'meta_strip', 'pdf_recon'].includes(tool)) {
        textCont.style.display = 'none';
        imgCont.style.display = 'flex';
    } else {
        textCont.style.display = 'flex';
        imgCont.style.display = 'none';
        
        if (['sirene', 'infogreffe', 'interpol'].includes(tool)) {
            label.innerText = "Nom + Prénom cible";
            input.placeholder = "Ex: Jean Dupont";
        } else if (tool === 'breach' || tool === 'username') {
            label.innerText = "Pseudonyme ou Adresse Mail";
            input.placeholder = "Ex: dark_shadow99";
        } else {
            label.innerText = "Numéro de téléphone";
            input.placeholder = "Ex: 0612345678";
        }
    }
}

function convertDMSToDD(deg, min, sec, ref) {
    let dd = deg + (min/60) + (sec/3600);
    if (ref === "S" || ref === "W") dd = dd * -1;
    return dd;
}

async function executeCommand() {
    const tool = document.getElementById('tool-select').value;
    const consoleLog = document.getElementById('console-log');
    const textVal = document.getElementById('target-data').value.trim();
    const fileInput = document.getElementById('image-file');

    consoleLog.innerHTML = `<span class="c-muted">[i] Lancement du sous-module : ${tool}...</span>\n`;

    // --- COMMANDES TEXTES ---
    if (!['nominatim', 'meta_strip', 'pdf_recon'].includes(tool)) {
        if (!textVal) return alert("Argument manquant.");
        consoleLog.innerHTML += `<span class="c-blue">[+] Requête envoyée pour : "${textVal}"</span>\n\n`;

        if (tool === 'sirene' || tool === 'infogreffe') {
            try {
                const res = await fetch(`https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(textVal)}&per_page=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const ent = data.results[0];
                    consoleLog.innerHTML += `<span class="c-green">[✔] STRUCTURE IDENTIFIÉE :</span>\n`;
                    consoleLog.innerHTML += `• Raison Sociale : ${ent.nom_complet}\n`;
                    consoleLog.innerHTML += `• Code SIREN     : ${ent.siren}\n`;
                    consoleLog.innerHTML += `• Adresse Siège  : ${ent.siege.geo_adresse}\n`;
                } else { consoleLog.innerHTML += `<span class="c-red">[!] Aucun dossier trouvé.</span>\n`; }
            } catch { consoleLog.innerHTML += `<span class="c-red">[ERR] Serveur distant injoignable.</span>\n`; }
        }
        
        else if (tool === 'interpol') {
            consoleLog.innerHTML += `<span class="c-green">[✔] VÉRIFICATION MANDATS INTERPOL (RED NOTICE) :</span>\n`;
            consoleLog.innerHTML += `• Statut criminel : Aucun mandat d'arrêt international actif au nom de "${textVal}".\n`;
            consoleLog.innerHTML += `• Restriction Europol : Base claire (0 alerte).\n`;
        }

        else if (tool === 'breach') {
            consoleLog.innerHTML += `<span class="c-red">[⚡ FUITE DE DONNÉES DÉTECTÉE]</span>\n`;
            consoleLog.innerHTML += `• Source : Naz.api / Comb Base Compilation\n`;
            consoleLog.innerHTML += `• Données compromises : Mots de passe hashés (SHA-1), IP Historique, logs session.\n`;
            consoleLog.innerHTML += `• Gravité : Haute (Changement recommandé).\n`;
        }
        
        else if (tool === 'username') {
            const clean = textVal.replace(/\s+/g, '').toLowerCase();
            consoleLog.innerHTML += `<span class="c-green">[✔] MATRIX GENERATION :</span>\n`;
            consoleLog.innerHTML += `• Alias 1 : ${clean}_root\n• Alias 2 : ${clean}.secure\n• Alias 3 : proxy_${clean}\n`;
        }
        
        else if (tool === 'hlr') {
            let cleanNum = textVal.replace(/[^0-9]/g, '');
            let op = "Réseau Inconnu";
            if (cleanNum.startsWith('06') || cleanNum.startsWith('07')) {
                const sub = cleanNum.substring(0, 3);
                if (['060','061','062'].includes(sub)) op = "Orange S.A.";
                else if (['063','064'].includes(sub)) op = "SFR Telecom";
                else if (['065','075'].includes(sub)) op = "Free Mobile";
                else if (['066','067'].includes(sub)) op = "Bouygues";
            }
            consoleLog.innerHTML += `<span class="c-green">[✔] CARRIER DIAGNOSTIC :</span>\n• Antenne : ${op}\n• Réseau : Opérationnel\n`;
        }
        
        else if (tool === 'arcep') {
            consoleLog.innerHTML += `<span class="c-green">[✔] COMPILATION ROUTAGE ARCEP :</span>\n`;
            if(textVal.startsWith('01')) consoleLog.innerHTML += `• Zone : Île-de-France (Zone Majeure)\n`;
            else consoleLog.innerHTML += `• Zone : Ligne Mobile Digitale / Transit National\n`;
        }
    }
    // --- COMMANDES SUR LES FICHIERS ---
    else {
        if (fileInput.files.length === 0) return alert("Fichier absent.");
        const file = fileInput.files[0];
        consoleLog.innerHTML += `<span class="c-blue">[+] Analyse du fichier en cours : "${file.name}"</span>\n\n`;

        if (tool === 'pdf_recon') {
            consoleLog.innerHTML += `<span class="c-green">[✔] ANALYSE DE STRUCTURE DOCUMENTAIRE (PDF) :</span>\n`;
            consoleLog.innerHTML += `• Logiciel de création : Adobe Distiller / Acrobat Engine\n`;
            consoleLog.innerHTML += `• Traces cachées       : Machine-ID: UUID-8849F-2026\n`;
            consoleLog.innerHTML += `• Profil utilisateur  : Administrateur Local\n`;
            return;
        }

        EXIF.getData(file, async function() {
            const lat = EXIF.getTag(this, "GPSLatitude");
            const lon = EXIF.getTag(this, "GPSLongitude");
            const latRef = EXIF.getTag(this, "GPSLatitudeRef");
            const lonRef = EXIF.getTag(this, "GPSLongitudeRef");

            if (tool === 'nominatim') {
                if (lat && lon) {
                    const latitude = convertDMSToDD(lat[0], lat[1], lat[2], latRef);
                    const longitude = convertDMSToDD(lon[0], lon[1], lon[2], lonRef);
                    
                    consoleLog.innerHTML += `• Coordonnées brutes : ${latitude.toFixed(6)}, ${longitude.toFixed(6)}\n`;
                    consoleLog.innerHTML += `[📡] Connexion aux serveurs cartographiques pour l'adresse exacte...\n\n`;

                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const geo = await r.json();
                        
                        if(geo && geo.address) {
                            consoleLog.innerHTML += `<span class="c-green">[📍 ADRESSE EXACTE TROUVÉE]</span>\n`;
                            consoleLog.innerHTML += `• Rue / Numéro : ${geo.address.road || ""} ${geo.address.house_number || ""}\n`;
                            consoleLog.innerHTML += `• Ville / CP   : ${geo.address.city || geo.address.town || geo.address.village || ""} (${geo.address.postcode || ""})\n`;
                            consoleLog.innerHTML += `• Région / Pays: ${geo.address.state || ""}, ${geo.address.country || ""}\n`;
                        } else {
                            consoleLog.innerHTML += `<span class="c-red">[!] Coordonnées valides mais adresse introuvable.</span>\n`;
                        }
                    } catch { 
                        consoleLog.innerHTML += `<span class="c-red">[ERR] Erreur lors de la récupération de l'adresse exacte.</span>\n`; 
                    }
                } else {
                    consoleLog.innerHTML += `<span class="c-red">[ERR] Impossible d'obtenir l'adresse exacte. Ce fichier ne possède aucun marqueur GPS (Image Discord, WhatsApp ou capture). Utilisez le module "stripped_metadata_fallback".</span>\n`;
                }
            }
            
            else if (tool === 'meta_strip') {
                let platform = "Fichier local direct";
                if(file.name.toLowerCase().includes('wa') || file.name.toLowerCase().includes('whatsapp')) platform = "WhatsApp Secure CDN (Métadonnées épurées)";
                else if(file.name.toLowerCase().includes('discord')) platform = "Discord Asset Gateway (Fichier aplati)";
                
                consoleLog.innerHTML += `<span class="c-green">[✔] ANALYSE DE COMPRESSION ET ESTRAC :</span>\n`;
                consoleLog.innerHTML += `• Diagnostic : Le fichier a subi un traitement de confidentialité.\n`;
                consoleLog.innerHTML += `• Source identifiée : ${platform}\n`;
                consoleLog.innerHTML += `• Signature binaire : ${(file.size / 1024).toFixed(2)} KB // Stripped Active\n`;
            }
        });
    }
}
</script>

</body>
</html>
