<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerbes-Modern">
    <title>KERBES OSINT PLATFORM</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border: #374151;
        }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .dash-header {
            background-color: #070a12;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dash-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .dash-title span {
            color: var(--accent-blue);
        }

        .window-dots {
            display: flex;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .d-red { background-color: #ef4444; }
        .d-yellow { background-color: #f59e0b; }
        .d-green { background-color: #10b981; }

        .dash-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input[type="text"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        input[type="file"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-muted);
        }

        #image-input-container { display: none; }

        .btn-execute {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-execute:hover {
            opacity: 0.9;
        }

        .console-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #console-log {
            background-color: #070a12;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            height: 280px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .c-green { color: var(--accent-green); }
        .c-red { color: var(--accent-red); }
        .c-blue { color: var(--accent-blue); }
        .c-muted { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="dash-header">
        <div class="dash-title">⚔️ KERBES <span>OSINT PLATFORM</span></div>
        <div class="window-dots">
            <div class="dot d-red"></div>
            <div class="dot d-yellow"></div>
            <div class="dot d-green"></div>
        </div>
    </div>
    
    <div class="dash-body">
        <!-- Sélecteur des 10 Outils -->
        <div class="field-group">
            <label for="tool-select">Module d'enquête actif</label>
            <select id="tool-select" onchange="switchTool()">
                <option value="sirene">1. sirene_registry_lookup (Nom/Prénom -> Insee)</option>
                <option value="infogreffe">2. greffe_corporate_scan (Nom/Prénom -> Sociétés)</option>
                <option value="username">3. user_alias_enumerator (Pseudo/Nom -> Hypothèses)</option>
                <option value="hlr">4. hlr_carrier_ping (Mobile -> Opérateur Racine)</option>
                <option value="arcep">5. arcep_zne_codec (Téléphone -> Zone Géo Fixe)</option>
                <option value="country">6. phone_country_resolver (International -> Préfixe)</option>
                <option value="exif">7. exif_gps_extractor (Image -> Coordonnées Brutes)</option>
                <option value="nominatim">8. reverse_geo_nominatim (Coordonnées -> Adresse)</option>
                <option value="meta_strip">9. stripped_metadata_fallback (Image Discord/WA)</option>
                <option value="imghash">10. digital_image_hash_engine (Image -> Signature)</option>
            </select>
        </div>

        <!-- Inputs Variables Dynamiques -->
        <div class="field-group" id="text-input-container">
            <label for="target-data">Donnée / Chaîne cible</label>
            <input type="text" id="target-data" placeholder="Ex: Jean Dupont" autocomplete="off">
        </div>

        <div class="field-group" id="image-input-container">
            <label for="image-file">Fichier cible à analyser</label>
            <input type="file" id="image-file" accept="image/jpeg, image/png, image/jpg">
        </div>

        <button class="btn-execute" onclick="executeCommand()">Lancer l'analyse du module</button>

        <!-- Console Intégrée Moderne -->
        <div class="console-wrapper">
            <label>Sortie Moniteur Système</label>
            <div id="console-log">=== READY FOR ANALYSIS SYSTEM v4.0 ===
[i] Sélectionnez un outil parmi les 10 options et insérez vos arguments pour compiler un rapport.</div>
        </div>
    </div>
</div>

<script>
function switchTool() {
    const tool = document.getElementById('tool-select').value;
    const textCont = document.getElementById('text-input-container');
    const imgCont = document.getElementById('image-input-container');
    const input = document.getElementById('target-data');

    if (['exif', 'nominatim', 'meta_strip', 'imghash'].includes(tool)) {
        textCont.style.display = 'none';
        imgCont.style.display = 'flex';
    } else {
        textCont.style.display = 'flex';
        imgCont.style.display = 'none';
        
        if (['sirene', 'infogreffe', 'username'].includes(tool)) {
            input.placeholder = "Ex: Jean Dupont";
        } else {
            input.placeholder = "Ex: 0612345678";
        }
    }
}

function convertDMSToDD(deg, min, sec, ref) {
    let dd = deg + (min/60) + (sec/3600);
    if (ref === "S" || ref === "W") dd = dd * -1;
    return dd;
}

async function executeCommand() {
    const tool = document.getElementById('tool-select').value;
    const consoleLog = document.getElementById('console-log');
    const textVal = document.getElementById('target-data').value.trim();
    const fileInput = document.getElementById('image-file');

    consoleLog.innerHTML = `<span class="c-muted">[i] Connexion au pipeline de données pour ${tool}...</span>\n`;

    if (['sirene', 'infogreffe', 'username', 'hlr', 'arcep', 'country'].includes(tool)) {
        if (!textVal) return alert("Paramètre requis manquant.");
        
        consoleLog.innerHTML += `<span class="c-blue">[+] Analyse en cours : "${textVal}"</span>\n\n`;

        if (tool === 'sirene' || tool === 'infogreffe') {
            try {
                const res = await fetch(`https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(textVal)}&per_page=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const ent = data.results[0];
                    consoleLog.innerHTML += `<span class="c-green">[SUCCESS] Registre National :</span>\n`;
                    consoleLog.innerHTML += `• Identité / Structure : ${ent.nom_complet}\n`;
                    consoleLog.innerHTML += `• Numéro Unique SIREN   : ${ent.siren}\n`;
                    consoleLog.innerHTML += `• Localisation Siège   : ${ent.siege.geo_adresse}\n`;
                } else {
                    consoleLog.innerHTML += `<span class="c-red">[!] Aucun enregistrement légal correspondant.</span>\n`;
                }
            } catch { consoleLog.innerHTML += `<span class="c-red">[ERR] Échec de la requête vers le serveur open-data.</span>\n`; }
        }
        
        else if (tool === 'username') {
            consoleLog.innerHTML += `<span class="c-green">[PSEUDONYMES CALCULÉS]</span>\n`;
            const clean = textVal.replace(/\s+/g, '').toLowerCase();
            consoleLog.innerHTML += `• Standard : ${clean}\n• Pro      : ${clean}-dev\n• Archive  : ${clean}2026\n`;
        }
        
        else if (tool === 'hlr') {
            let cleanNum = textVal.replace(/[^0-9]/g, '');
            let op = "Réseau Virtuel / Inconnu";
            if (cleanNum.startsWith('06') || cleanNum.startsWith('07')) {
                const sub = cleanNum.substring(0, 3);
                if (['060','061','062'].includes(sub)) op = "Orange France";
                else if (['063','064'].includes(sub)) op = "SFR";
                else if (['065','075'].includes(sub)) op = "Free Mobile";
                else if (['066','067'].includes(sub)) op = "Bouygues Telecom";
            }
            consoleLog.innerHTML += `<span class="c-green">[ANALYSE SIM TERMINÉE]</span>\n• Infrastructures physiques : ${op}\n• Statut : Ligne Distribuée\n`;
        }
        
        else if (tool === 'arcep' || tool === 'country') {
            if(textVal.startsWith('01') || textVal.startsWith('331')) consoleLog.innerHTML += `• Routage ARCEP : Île-de-France\n`;
            else consoleLog.innerHTML += `• Routage ARCEP : Trunk National Mobile\n`;
            consoleLog.innerHTML += `• Origine Filaire : France (+33)\n`;
        }
    }
    else {
        if (fileInput.files.length === 0) return alert("Fichier manquant.");
        const file = fileInput.files[0];
        
        consoleLog.innerHTML += `<span class="c-blue">[+] Traitement du fichier : "${file.name}"</span>\n\n`;

        EXIF.getData(file, async function() {
            const lat = EXIF.getTag(this, "GPSLatitude");
            const lon = EXIF.getTag(this, "GPSLongitude");
            const latRef = EXIF.getTag(this, "GPSLatitudeRef");
            const lonRef = EXIF.getTag(this, "GPSLongitudeRef");

            if (tool === 'exif') {
                if (lat && lon) {
                    consoleLog.innerHTML += `<span class="c-green">[DONNÉES EXIF BRUTES EXTRAITES]</span>\n`;
                    consoleLog.innerHTML += `• Lat : ${lat.join(', ')} ${latRef}\n`;
                    consoleLog.innerHTML += `• Lon : ${lon.join(', ')} ${lonRef}\n`;
                } else {
                    consoleLog.innerHTML += `<span class="c-red">[!] Données EXIF vides. Aucun repère embarqué dans le fichier.</span>\n`;
                }
            }
            
            else if (tool === 'nominatim') {
                if (lat && lon) {
                    const latitude = convertDMSToDD(lat[0], lat[1], lat[2], latRef);
                    const longitude = convertDMSToDD(lon[0], lon[1], lon[2], lonRef);
                    try {
                        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const geo = await r.json();
                        consoleLog.innerHTML += `<span class="c-green">[GÉOLOCALISATION ADRESSE]</span>\n• Emplacement : ${geo.display_name}\n`;
                    } catch { consoleLog.innerHTML += `[ERR] Erreur réseau lors de la conversion géographique.\n`; }
                } else {
                    consoleLog.innerHTML += `<span class="c-red">[ERR] Indisponible : Absences de coordonnées sources.</span>\n`;
                }
            }
            
            else if (tool === 'meta_strip') {
                let platform = "Fichier local d'origine";
                if(file.name.toLowerCase().includes('wa') || file.name.toLowerCase().includes('whatsapp')) platform = "WhatsApp CDN System (Nettoyage automatique)";
                else if(file.name.toLowerCase().includes('discord')) platform = "Discord Asset Pipeline (Données purgées)";
                
                consoleLog.innerHTML += `<span class="c-green">[DIAGNOSTIC STRIPPING]</span>\n• Signature : Fichier épuré pour la vie privée.\n• Source suspectée : ${platform}\n`;
            }
            
            else if (tool === 'imghash') {
                consoleLog.innerHTML += `<span class="c-green">[SIGNATURE LOGIQUE IMAGE]</span>\n`;
                consoleLog.innerHTML += `• Dimension binaire : ${file.size} Octets\n`;
                consoleLog.innerHTML += `• Type Mime défini  : ${file.type}\n`;
            }
        });
    }
}
</script>

</body>
</html>
