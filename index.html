<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Balises pour forcer le mode plein écran sur iOS/iPadOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Settings">
    <title>Settings</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* Pas de curseur pour faire plus vrai */
            background-color: black;
        }

        /* --- Écran 1 : L'apparence normale (Fausse) --- */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            /* IMPORTANT : Remplace 'ton-screenshot.jpg' par le lien de ton image hébergée */
            background-image: url('https://lien-vers-votre-image-hebergee.com/votre-screenshot.jpg'); 
            z-index: 1;
        }

        /* --- Écran 2 : La Fissure (Cachée au début) --- */
        #crack {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* J'ai pris une image de fissure sur internet pour l'exemple */
            background-image: url('https://www.transparentpng.com/download/glass-crack/transparent-background-glass-crack-0.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2; /* Par-dessus l'écran d'accueil */
            opacity: 0; /* Invisible au chargement */
            pointer-events: none; /* Permet de cliquer "à travers" */
            transition: opacity 0.1s ease-in;
        }
    </style>
</head>
<body>

<!-- L'élément qui montre le faux fond d'écran -->
<div id="home-screen"></div>

<!-- L'élément qui montre la fissure -->
<div id="crack"></div>

<!-- Le son de la vitre cassée (hébergé quelque part) -->
<audio id="crack-sound" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/glass_breaking.mp3" type="audio/mpeg">
</audio>

<script>
    const homeScreen = document.getElementById('home-screen');
    const crackEffect = document.getElementById('crack');
    const crackSound = document.getElementById('crack-sound');

    // Fonction pour déclencher le prank
    function casserEcran(e) {
        // 1. Rendre la fissure visible
        crackEffect.style.opacity = '1';
        
        // 2. Jouer le son (il faut parfois que l'utilisateur ait déjà cliqué une fois sur la page pour que le son marche sur iOS, c'est une sécurité)
        crackSound.play().catch(error => console.log("Erreur son :", error));

        // Pour faire plus vrai, on peut désactiver les clics après la casse
        document.removeEventListener('click', casserEcran);
    }

    // Activer l'écouteur de clic sur tout le corps de la page
    document.addEventListener('click', casserEcran);

</script>

</body>
</html>
