<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Balises pour forcer le mode plein écran sur l'écran d'accueil iOS/iPadOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Terminal">
    <title>Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #0f0; /* Vert style hacker */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            box-sizing: border-box;
            height: 100vh;
        }
        #terminal {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .input-line {
            display: flex;
            align-items: center;
        }
        .prompt {
            color: #33ff33;
            margin-right: 5px;
        }
        input {
            background: transparent;
            border: none;
            color: #0f0;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            padding: 0;
        }
        .error { color: #ff3333; }
        .info { color: #33ccff; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">--- SYSTEM OVERRIDE CORE v4.2 ---
Tape 'help' pour voir les commandes.

</div>
    <div class="input-line">
        <span class="prompt">root@ipad-macbook:~#</span>
        <input type="text" id="cmd" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('cmd');
const terminal = document.getElementById('terminal');

// Garder le focus sur l'input quand on clique n'importe où
document.addEventListener('click', () => input.focus());

input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const fullCmd = this.value.trim();
        const args = fullCmd.split(' ');
        const cmd = args[0].toLowerCase();
        
        // Afficher la commande tapée
        output.innerHTML += `root@ipad-macbook:~# ${fullCmd}\n`;

        if (fullCmd !== "") {
            executeCommand(cmd, args.slice(1));
        }

        this.value = '';
        terminal.scrollTop = terminal.scrollHeight; // Scroll automatique
    }
});

function executeCommand(cmd, args) {
    switch(cmd) {
        case 'help':
            output.innerHTML += "Commandes : ls, clear, neofetch, hack-mode, matrix\n";
            break;
        case 'ls':
            output.innerHTML += "documents/  telechargements/  <span class='error'>system_core.bin</span>\n";
            break;
        case 'clear':
            output.innerHTML = '';
            break;
        case 'whoami':
            output.innerHTML += "root\n";
            break;
        case 'neofetch':
            output.innerHTML += "<span class='info'>OS:</span> Fake-macOS Catalina running on iPad\n<span class='info'>Kernel:</span> Bypass-10.4\n<span class='info'>Uptime:</span> 1337 mins\n";
            break;
        case 'hack-mode':
            output.innerHTML += "<span class='error'>[!] INITIALISATION DU COMPTE À REBOURS DE DÉSTRUCTION DU SYSTÈME...</span>\n(C'est une blague 😉)\n";
            break;
        case 'matrix':
            output.innerHTML += "01010100010010000100010100100000010011010100000101010100010100100100100101011000\n";
            break;
        default:
            output.innerHTML += `bash: ${cmd}: command not found\n`;
    }
}
</script>
</body>
</html>
