<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerbes-Local">
    <title>Kerbes Local OSINT</title>
    <!-- Inclusion de la bibliothèque pour lire les métadonnées des images -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        body {
            background-color: #080b11;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 10px auto;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 20px;
            border-radius: 12px;
        }
        h1 { color: #38bdf8; font-size: 20px; text-align: center; margin: 0 0 5px 0; }
        .subtitle { color: #6b7280; font-size: 12px; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 5px; }
        select, input {
            width: 100%; padding: 10px; background: #030712; border: 1px solid #374151;
            color: white; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none;
        }
        #image-group { display: none; }
        button {
            width: 100%; background: #0284c7; color: white; border: none; padding: 12px;
            font-size: 15px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        #output-box {
            margin-top: 15px; padding: 15px; background: #030712; border: 1px solid #1f2937;
            border-radius: 6px; display: none; max-height: 250px; overflow-y: auto;
            font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap;
        }
        .danger { color: #ef4444; }
        .success { color: #22c55e; }
        .info { color: #38bdf8; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ KERBES INTERNAL SYSTEM</h1>
    <div class="subtitle">Analyseur de données & Extracteur GPS (No Redirect)</div>

    <div class="form-group">
        <label for="search-type">Type de recherche :</label>
        <select id="search-type" onchange="toggleInputType()">
            <option value="name">Nom + Prénom</option>
            <option value="phone">Numéro de téléphone</option>
            <option value="email">Adresse E-mail</option>
            <option value="ip">Adresse IP</option>
            <option value="image">Image (Localiser une photo)</option>
        </select>
    </div>

    <!-- Groupe pour le texte classique -->
    <div class="form-group" id="text-group">
        <label id="input-label" for="target-input">Donnée cible :</label>
        <input type="text" id="target-input" placeholder="Ex: Jean Dupont">
    </div>

    <!-- Groupe spécifique pour l'import d'image -->
    <div class="form-group" id="image-group">
        <label for="image-input">Sélectionner une photo (JPEG de préférence) :</label>
        <input type="file" id="image-input" accept="image/jpeg, image/jpg">
    </div>

    <button onclick="startLocalScan()">LANCER L'ANALYSE</button>

    <div id="output-box"></div>
</div>

<script>
function toggleInputType() {
    const type = document.getElementById('search-type').value;
    const textGroup = document.getElementById('text-group');
    const imageGroup = document.getElementById('image-group');
    const input = document.getElementById('target-input');

    if (type === 'image') {
        textGroup.style.display = 'none';
        imageGroup.style.display = 'block';
    } else {
        textGroup.style.display = 'block';
        imageGroup.style.display = 'none';
        if(type === 'name') input.placeholder = "Ex: Jean Dupont";
        if(type === 'phone') input.placeholder = "Ex: +33612345678";
        if(type === 'email') input.placeholder = "Ex: cible@gmail.com";
        if(type === 'ip') input.placeholder = "Ex: 8.8.8.8";
    }
}

// Fonction pour convertir le format EXIF (Degrés, Minutes, Secondes) en coordonnées décimales utilisables
function ConvertDMSToDD(degrees, minutes, seconds, direction) {
    let dd = degrees + (minutes/60) + (seconds/3600);
    if (direction == "S" || direction == "W") { dd = dd * -1; }
    return dd;
}

async function startLocalScan() {
    const type = document.getElementById('search-type').value;
    const output = document.getElementById('output-box');

    output.style.display = "block";
    output.innerHTML = `<span class="info">[🔄] Requête envoyée au cœur système...</span>\n`;

    // --- NOUVEAU : RECHERCHE PAR IMAGE ---
    if (type === 'image') {
        const fileInput = document.getElementById('image-input');
        if (fileInput.files.length === 0) {
            output.innerHTML += `<span class="danger">[❌] Erreur: Veuillez importer une image d'abord.</span>`;
            return;
        }

        const file = fileInput.files[0];
        output.innerHTML += `[📡] Analyse des métadonnées binaires de l'image...\n`;

        // Utilisation d'EXIF.js pour lire le fichier chargé localement
        EXIF.getData(file, async function() {
            const lat = EXIF.getTag(this, "GPSLatitude");
            const lon = EXIF.getTag(this, "GPSLongitude");
            const latRef = EXIF.getTag(this, "GPSLatitudeRef");
            const lonRef = EXIF.getTag(this, "GPSLongitudeRef");

            if (!lat || !lon) {
                output.innerHTML += `<span class="danger">❌ Aucune coordonnée GPS masquée trouvée dans cette image.</span>\n(Note: Les réseaux comme WhatsApp ou Discord effacent souvent ces données au partage. Teste avec une vraie photo prise directement par l'appareil de l'iPad !)`;
                return;
            }

            // Conversion des coordonnées
            const latitude = ConvertDMSToDD(lat[0], lat[1], lat[2], latRef);
            const longitude = ConvertDMSToDD(lon[0], lon[1], lon[2], lonRef);

            output.innerHTML += `[🎯] Coordonnées brutes extraites : ${latitude.toFixed(5)}, ${longitude.toFixed(5)}\n`;
            output.innerHTML += `[🌐] Interrogation des registres cartographiques (Nominatim)...\n`;

            try {
                // Appel direct et transparent à OpenStreetMap pour obtenir l'adresse exacte
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const geoData = await response.json();

                if (geoData && geoData.address) {
                    output.innerHTML += `<span class="success">📍 ADRESSE DE L'IMAGE TROUVÉE :</span>\n`;
                    output.innerHTML += `• Ville   : ${geoData.address.city || geoData.address.town || geoData.address.village || "Inconnue"}\n`;
                    output.innerHTML += `• Code Post: ${geoData.address.postcode || "Inconnu"}\n`;
                    output.innerHTML += `• Adresse  : ${geoData.address.road || ""} ${geoData.address.house_number || ""}\n`;
                    output.innerHTML += `• Pays    : ${geoData.address.country || ""}\n`;
                } else {
                    output.innerHTML += `<span class="danger">⚠️ Impossible de traduire les coordonnées en adresse textuelle.</span>`;
                }
            } catch {
                output.innerHTML += `<span class="danger">❌ Erreur lors de la récupération de l'adresse géographique.</span>`;
            }
        });
    }

    // --- LES AUTRES OPTIONS DU MENU (RESTE INCHANGÉ) ---
    else {
        const target = document.getElementById('target-input').value.trim();
        if (!target) return alert("Entrez une cible !");

        if (type === 'name') {
            output.innerHTML += `[📡] Recherche pour: ${target}...\n`;
            setTimeout(() => {
                output.innerHTML += `<span class="danger">⚠️ Profils potentiels détectés :</span>\n• Registre civil trouvé (France)\n• Empreintes numériques détectées sur les réseaux sociaux.`;
            }, 1000);
        }
        else if (type === 'phone') {
            output.innerHTML += `[📡] Analyse de la ligne téléphonique...\n`;
            setTimeout(() => {
                output.innerHTML += `<span class="success">✅ Infos extraites :</span>\n• Format : Valide\n• Type : Ligne Mobile GSM\n• Opérateur d'origine détecté.`;
            }, 1000);
        }
        else if (type === 'email') {
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://haveibeenpwned.com/api/v3/breachedaccount/' + target)}`);
                const data = await response.json();
                if (data.status && data.status.http_code === 404) {
                    output.innerHTML += `<span class="success">✅ Propre ! Aucune fuite détectée pour ${target}.</span>`;
                } else {
                    output.innerHTML += `<span class="danger">❌ ALERTE ! Cet e-mail a été trouvé dans des fuites publiques.</span>`;
                }
            } catch { output.innerHTML += `[❌] Erreur serveur.`; }
        }
        else if (type === 'ip') {
            try {
                const response = await fetch(`https://ipapi.co/${target}/json/`);
                const data = await response.json();
                output.innerHTML += `<span class="success">📊 Données trouvées :</span>\n• Pays : ${data.country_name}\n• Ville : ${data.city}\n• ISP : ${data.org}`;
            } catch { output.innerHTML += `[❌] Échec du scan IP.`; }
        }
    }
}
</script>

</body>
</html>
