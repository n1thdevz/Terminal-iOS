<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Configuration PWA Plein Écran pour l'iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerbes-OSINT">
    <title>Kerbes Toolbox OSINT</title>
    <style>
        body {
            background-color: #080b11;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #38bdf8;
            font-size: 22px;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 13px;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background: #030712;
            border: 1px solid #374151;
            color: white;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            background: #0284c7;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #0369a1;
        }
        #output-box {
            margin-top: 20px;
            padding: 15px;
            background: #030712;
            border: 1px solid #1f2937;
            border-radius: 6px;
            display: none;
        }
        .action-link {
            display: block;
            background: #1e293b;
            color: #38bdf8;
            text-decoration: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ KERBES HUB TOOLBOX</h1>
    <div class="subtitle">Console de redirection et d'enquêtes de données réelles</div>

    <div class="form-group">
        <label for="search-type">Type de recherche :</label>
        <select id="search-type">
            <option value="pseudo">Nom d'utilisateur / Pseudo</option>
            <option value="email">Adresse E-mail</option>
            <option value="ip">Adresse IP</option>
        </select>
    </div>

    <div class="form-group">
        <label for="target-input">Cible :</label>
        <input type="text" id="target-input" placeholder="Entrer la cible ici...">
    </div>

    <button onclick="launchInvestigation()">Lancer la recherche</button>

    <div id="output-box"></div>
</div>

<script>
function launchInvestigation() {
    const type = document.getElementById('search-type').value;
    const target = document.getElementById('target-input').value.trim();
    const output = document.getElementById('output-box');

    if (!target) {
        alert("Veuillez entrer une cible !");
        return;
    }

    output.style.display = "block";
    output.innerHTML = `<p style="color: #eab308;">🛠️ Génération des liens d'enquêtes pour : <strong>${target}</strong>...</p>`;

    let linksHTML = `<p style="font-size: 14px; color: #9ca3af;">Cliquez sur l'un des moteurs réels ci-dessous pour lancer l'analyse externe :</p>`;

    if (type === 'pseudo') {
        // Redirection vers des moteurs OSINT de recherche de pseudos
        linksHTML += `<a href="https://whatsmyname.app/?q=${target}" target="_blank" class="action-link">🔍 Tracker sur WhatsMyName (Réel)</a>`;
        linksHTML += `<a href="https://github.com/${target}" target="_blank" class="action-link">🐙 Vérifier le profil GitHub</a>`;
    } 
    else if (type === 'email') {
        // Redirection vers la vraie base de données de fuites d'e-mails
        linksHTML += `<a href="https://haveibeenpwned.com/account/${target}" target="_blank" class="action-link">💀 Vérifier les Leaks sur HaveIBeenPwned</a>`;
        linksHTML += `<a href="https://leakcheck.io/" target="_blank" class="action-link">🔑 Tester sur LeakCheck Database</a>`;
    } 
    else if (type === 'ip') {
        // Redirection vers la localisation et les infos de l'IP
        linksHTML += `<a href="https://ipinfo.io/${target}" target="_blank" class="action-link">🌐 Localiser et analyser l'IP sur IPInfo</a>`;
        linksHTML += `<a href="https://www.shodan.io/host/${target}" target="_blank" class="action-link">📡 Scanner les ports ouverts sur Shodan</a>`;
    }

    setTimeout(() => {
        output.innerHTML = linksHTML;
    }, 800);
}
</script>

</body>
</html>
