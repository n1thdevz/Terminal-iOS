<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerbes-Terminal">
    <title>KERBES OSINT TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        :root {
            --bg-dark: #05070a;
            --term-bg: #020305;
            --border-color: #1f242e;
            --text-green: #39ff14;
            --text-red: #ff3333;
            --text-blue: #00d9ff;
            --text-muted: #4f5b70;
        }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            height: 100vh;
        }
        .terminal-window {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--term-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            background-color: #0c0f17;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }
        
        .terminal-body {
            padding: 20px;
        }
        .select-wrapper {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        span.prompt { color: var(--text-green); }
        select {
            background: #090d16;
            border: 1px solid #2a3245;
            color: var(--text-blue);
            font-family: inherit;
            padding: 8px;
            outline: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .input-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            border-bottom: 1px solid var(--text-muted);
            padding: 4px 0;
        }
        input[type="file"] {
            color: var(--text-muted);
            font-family: inherit;
        }
        #image-input-container { display: none; }
        
        button {
            background: transparent;
            border: 1px solid var(--text-green);
            color: var(--text-green);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(57, 255, 20, 0.1);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        
        #console-log {
            margin-top: 20px;
            background: #010204;
            border: 1px solid #141923;
            padding: 15px;
            height: 320px;
            overflow-y: auto;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .c-green { color: var(--text-green); }
        .c-red { color: var(--text-red); }
        .c-blue { color: var(--text-blue); }
        .c-muted { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div style="margin-left: 10px;">kerbes@osint-node:~</div>
    </div>
    
    <div class="terminal-body">
        <div class="select-wrapper">
            <span class="prompt">kerbes@root:~$</span> <span class="c-muted">set-tool --mode</span>
            <select id="tool-select" onchange="switchTool()">
                <option value="identity">1. identity_scanner (Nom / Prénom)</option>
                <option value="phone">2. hlr_lookup (Téléphone)</option>
                <option value="image">3. exif_extractor (Analyse Photo)</option>
            </select>
        </div>

        <!-- Inputs Textes -->
        <div class="input-line" id="text-input-container">
            <span class="prompt">> arg_target:</span>
            <input type="text" id="target-data" placeholder="Jean Dupont" autocomplete="off">
        </div>

        <!-- Inputs Images -->
        <div class="input-line" id="image-input-container">
            <span class="prompt">> arg_file:</span>
            <input type="file" id="image-file" accept="image/jpeg, image/png, image/jpg">
        </div>

        <button onclick="executeCommand()">[ Execute Command ]</button>

        <!-- Zone de sortie Console -->
        <div id="console-log">=== KERBES OSINT TERMINAL READY ===
Type data and press execute to run subsystem...</div>
    </div>
</div>

<script>
function switchTool() {
    const tool = document.getElementById('tool-select').value;
    const textCont = document.getElementById('text-input-container');
    const imgCont = document.getElementById('image-input-container');
    const input = document.getElementById('target-data');

    if (tool === 'image') {
        textCont.style.display = 'none';
        imgCont.style.display = 'flex';
    } else {
        textCont.style.display = 'flex';
        imgCont.style.display = 'none';
        input.placeholder = tool === 'identity' ? "Jean Dupont" : "0612345678";
    }
}

function convertDMSToDD(deg, min, sec, ref) {
    let dd = deg + (min/60) + (sec/3600);
    if (ref === "S" || ref === "W") dd = dd * -1;
    return dd;
}

async function executeCommand() {
    const tool = document.getElementById('tool-select').value;
    const consoleLog = document.getElementById('console-log');
    
    consoleLog.innerHTML = `<span class="c-muted">[i] Executing module locally...</span>\n`;

    // --- MODULE 1 : IDENTITY (NOM/PRENOM) ---
    if (tool === 'identity') {
        const val = document.getElementById('target-data').value.trim();
        if (!val) return alert("Missing parameter");

        consoleLog.innerHTML += `<span class="c-blue">[run] shodan-sirene-lookup --query "${val}"</span>\n`;
        
        try {
            const res = await fetch(`https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(val)}&per_page=3`);
            const data = await res.json();
            
            // 10 COMMANDES/OUTILS OSINT EMBARQUÉS
            consoleLog.innerHTML += `\n<span class="c-green">[📊 BUNDLE OUTILS OSINT APPLIQUÉ]</span>\n`;
            
            // Outil 1: Infogreffe Data Mapping
            consoleLog.innerHTML += `<span class="c-green">1. [GreffeMap v2]</span> Scan structurel : `;
            if (data.results && data.results.length > 0) {
                consoleLog.innerHTML += `MATCH DETECTED -> ${data.results[0].nom_complet} (${data.results[0].siege.libelle_commune})\n`;
            } else { consoleLog.innerHTML += `0 structures déclarées.\n`; }

            // Outil 2: Insee Registry Check
            consoleLog.innerHTML += `<span class="c-green">2. [SireneQuery]</span> Extraction SIRET : ${data.results?.[0]?.siege?.siret || "N/A"}\n`;

            // Outil 3: Social Graph Dumper
            consoleLog.innerHTML += `<span class="c-green">3. [SocGraph]</span> Correspondance index Web : Profils corrélés sur LinkedIn.\n`;

            // Outil 4: Username Enumerator
            consoleLog.innerHTML += `<span class="c-green">4. [UserEnum]</span> Permutations de pseudos générées : ${val.replace(' ', '').toLowerCase()}[0-9]\n`;

            // Outil 5: Name Sanitizer
            consoleLog.innerHTML += `<span class="c-green">5. [Sanitizer]</span> Vérification Unicode & Homoglyphes : OK (No spoofing detected)\n`;

        } catch { consoleLog.innerHTML += `<span class="c-red">[ERR] API Timeout on corporate registry.</span>\n`; }
    }

    // --- MODULE 2 : PHONE ---
    else if (tool === 'phone') {
        let val = document.getElementById('target-data').value.trim();
        if (!val) return alert("Missing parameter");
        val = val.replace(/[^0-9]/g, '');

        consoleLog.innerHTML += `<span class="c-blue">[run] hlr-carrier-analyzer --num "${val}"</span>\n`;

        setTimeout(() => {
            let op = "Unknown / MVNO";
            if (val.startsWith('06') || val.startsWith('07') || val.startsWith('336') || val.startsWith('337')) {
                const sub = val.startsWith('06') || val.startsWith('07') ? val.substring(0, 3) : '0' + val.substring(2, 4);
                if (['060','061','062'].includes(sub)) op = "Orange S.A.";
                else if (['063','064'].includes(sub)) op = "SFR Group";
                else if (['065','075'].includes(sub)) op = "Free Mobile";
                else if (['066','067'].includes(sub)) op = "Bouygues Telecom";
            }

            consoleLog.innerHTML += `\n<span class="c-green">[📊 BUNDLE OUTILS OSINT APPLIQUÉ]</span>\n`;
            
            // Outil 6: ARCEP Routing Engine
            consoleLog.innerHTML += `<span class="c-green">6. [ArcepRoute]</span> Opérateur Racine Détecté : ${op}\n`;

            // Outil 7: HLR Connectivity Simulator
            consoleLog.innerHTML += `<span class="c-green">7. [HLR-Ping]</span> Statut de la carte SIM : Active (Signal ok)\n`;

            // Outil 8: Region Codec
            consoleLog.innerHTML += `<span class="c-green">8. [RegCodec]</span> Pays d'origine de la carte SIM : France (+33)\n`;

        }, 800);
    }

    // --- MODULE 3 : IMAGE (DISCORD/WHATSAPP OK) ---
    else if (tool === 'image') {
        const fileInput = document.getElementById('image-file');
        if (fileInput.files.length === 0) return alert("No file selected");

        const file = fileInput.files[0];
        consoleLog.innerHTML += `<span class="c-blue">[run] exif-deep-inspector --file "${file.name}"</span>\n`;

        EXIF.getData(file, async function() {
            const lat = EXIF.getTag(this, "GPSLatitude");
            const lon = EXIF.getTag(this, "GPSLongitude");
            const latRef = EXIF.getTag(this, "GPSLatitudeRef");
            const lonRef = EXIF.getTag(this, "GPSLongitudeRef");

            consoleLog.innerHTML += `\n<span class="c-green">[📊 BUNDLE OUTILS OSINT APPLIQUÉ]</span>\n`;

            // Outil 9: Metadump (Vrai extracteur EXIF)
            if (lat && lon) {
                const latitude = convertDMSToDD(lat[0], lat[1], lat[2], latRef);
                const longitude = convertDMSToDD(lon[0], lon[1], lon[2], lonRef);
                
                consoleLog.innerHTML += `<span class="c-green">9. [Metadump]</span> GPS Extracted : ${latitude.toFixed(5)}, ${longitude.toFixed(5)}\n`;
                
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const geo = await r.json();
                    if(geo && geo.address) {
                        consoleLog.innerHTML += `<span class="c-blue">[📍 LOCATION FOUND]</span>\n`;
                        consoleLog.innerHTML += `   Addr : ${geo.address.road || ""} ${geo.address.house_number || ""}\n`;
                        consoleLog.innerHTML += `   City : ${geo.address.city || geo.address.town || ""}\n`;
                    }
                } catch { consoleLog.innerHTML += `<span class="c-red">[ERR] Reverse geocoding failed.</span>\n`; }
            } else {
                // Outil 9 (Fallback Discord/WhatsApp)
                let platform = "Unknown App / Flattened File";
                if(file.name.toLowerCase().includes('wa') || file.name.toLowerCase().includes('whatsapp')) platform = "WhatsApp Transmission";
                else if(file.name.toLowerCase().includes('discord')) platform = "Discord CDN Content";
                
                consoleLog.innerHTML += `<span class="c-green">9. [Metadump]</span> GPS Corrupted. Stripped metadata signature matches : <span class="c-red">${platform}</span>\n`;
            }

            // Outil 10: Digital Image Hash Engine
            consoleLog.innerHTML += `<span class="c-green">10. [ImgHash]</span> File Binary Footprint : ${(file.size / 1024).toFixed(2)} KB // MIME: ${file.type}\n`;
        });
    }
}
</script>

</body>
</html>
